name: Metrics
on:
  schedule: [{ cron: "0 0 * * *" }]
  workflow_dispatch:
  push: { branches: ["main"] }
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          user: chatman-media
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg

          base: header, activity, community, repositories, metadata
          base_indepth: yes
          config_timezone: Asia/Bangkok
          committer_message: "chore: update metrics"

          plugin_introduction: yes # общая информация о аккаунте

          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_API_KEY }}
          plugin_wakatime_days: 7
          plugin_wakatime_sections: time, projects, projects-graphs, languages, languages-graphs, editors
          plugin_wakatime_limit: 5

          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          plugin_languages: yes # отображение применяемых языков программирования
          plugin_languages_details: bytes-size, percentage # дополнительная информация о коде размер и процент

          plugin_stargazers: yes
          plugin_stargazers_charts: yes
          plugin_stargazers_charts_type: classic

          plugin_topics: yes # плагин ипсользуемых тем
          plugin_topics_limit: 0
          plugin_topics_mode: icons

          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7.5
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_other: yes
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

          plugin_notable: yes # вклад в чужие репозитории
          plugin_notable_from: all # и юзеры, и организации
          # только pull_request: комбинация commit + pull_request стабильно роняет
          # GitHub GraphQL (502) на repositoriesContributedTo для этого аккаунта
          plugin_notable_types: pull_request
          plugin_notable_repositories: yes # показывать имена репозиториев
          plugin_notable_filter: stars:>100

          plugin_people: yes
          plugin_people_limit: 24
          plugin_people_size: 28
          plugin_people_types: followers, following

          plugin_repositories: yes
          plugin_repositories_featured: chatman-media/timeline-studio, chatman-media/lead-engine, chatman-media/rag
          plugin_repositories_pinned: 6 # плюс пины с профиля
          plugin_repositories_order: featured, pinned, starred, random

          plugin_stars: yes
          plugin_stars_limit: 2

          plugin_followup: yes
          plugin_followup_sections: repositories, user
          plugin_followup_indepth: yes

          plugin_calendar: yes
          plugin_calendar_limit: 1

          plugin_code: yes
          plugin_code_lines: 12
          plugin_code_load: 400
          plugin_code_days: 3
          plugin_code_visibility: public
